{% extends 'base.html' %}
{% block title %}Setup | Password Manager{% endblock %}
{% block content %}
<div class="auth-card">
  <h1>&#128274; Create Master Password</h1>
  <p class="subtitle">Set a strong master password to protect your vault. You'll only do this once.</p>
  <form method="POST">
    <div class="form-group">
      <label for="password">Master Password</label>
      <input type="password" id="password" name="password" placeholder="Min 8 characters" required autofocus />
    </div>
    <div class="form-group">
      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required />
    </div>
    <button type="submit" class="btn btn-primary btn-full">Create Vault</button>
  </form>
</div>
{% endblock %}
